openapi: 3.1.0
info:
  title: Brave Search Images Videos API
  description: The Brave Search API provides programmatic access to Brave's independent search index covering web, news, image, video, suggest, spellcheck, summarizer, and local POI endpoints. Requests authenticate via the X-Subscription-Token header issued through the Brave Search API dashboard.
  version: '1.0'
  contact:
    name: Brave Search API
    url: https://api-dashboard.search.brave.com/app/documentation
servers:
- url: https://api.search.brave.com/res/v1
  description: Production API
security:
- SubscriptionToken: []
tags:
- name: Videos
paths:
  /videos/search:
    get:
      summary: Video search
      operationId: videoSearch
      tags:
      - Videos
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
      - name: count
        in: query
        schema:
          type: integer
          default: 20
          maximum: 50
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      - name: country
        in: query
        schema:
          type: string
      - name: search_lang
        in: query
        schema:
          type: string
      - name: ui_lang
        in: query
        schema:
          type: string
      - name: safesearch
        in: query
        schema:
          type: string
          enum:
          - false
          - moderate
          - strict
      - name: freshness
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Video results
          content:
            application/json:
              schema:
                type: object
components:
  securitySchemes:
    SubscriptionToken:
      type: apiKey
      in: header
      name: X-Subscription-Token
